<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="tidbit-type" content="founder">
  <meta name="tidbit-subject" content="Juan Alcala">
  <meta name="tidbit-company" content="FiberMend">
  <meta name="tidbit-date" content="2026-07-01">
  <meta name="tidbit-period" content="2026-W27">
  <title>Juan Alcala - FiberMend - July 1, 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-snap-type: y mandatory; scroll-behavior: smooth; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #0f0f0f; color: #e5e5e5; line-height: 1.6; }
    
    .slide {
      min-height: 100vh;
      scroll-snap-align: start;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
    }
    
    .card {
      max-width: 600px;
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 2.5rem;
    }
    
    .cover-card {
      text-align: center;
      border: 2px solid #3b82f6;
    }
    
    h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; color: #fff; }
    
    .subtitle { font-size: 1.25rem; color: #6b7280; margin-bottom: 0.5rem; }
    .date { font-size: 1rem; color: #6b7280; margin-bottom: 2rem; }
    .scroll-hint { font-size: 0.875rem; color: #3b82f6; margin-top: 3rem; }
    
    .label { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: #6b7280; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.75rem; }
    
    p { margin-bottom: 1rem; color: #d1d5db; }
    
    .page-number {
      position: absolute;
      bottom: 1.5rem;
      right: 2rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: #4b5563;
    }
    
    .stat-row {
      display: flex;
      justify-content: center;
      gap: 3rem;
      margin: 2rem 0;
    }
    
    .stat {
      text-align: center;
    }
    
    .stat-value {
      font-size: 3rem;
      font-weight: 800;
      color: #f97316;
    }
    
    .stat-label {
      font-size: 0.875rem;
      color: #6b7280;
    }
    
    .simple-box {
      background: #1e1e1e;
      border: 1px solid #3b82f6;
      border-radius: 8px;
      padding: 1.5rem;
      margin: 1.5rem 0;
      text-align: center;
    }
    
    .simple-box p {
      color: #fff;
      font-size: 1.1rem;
      margin: 0;
    }
  </style>
</head>
<body>

  <!-- SLIDE 1: COVER -->
  <div class="slide">
    <div class="card cover-card">
      <p class="subtitle">FiberMend</p>
      <h1>Juan Alcala</h1>
      <p class="date">July 1, 2026</p>
      <p class="scroll-hint">scroll ↓</p>
    </div>
    <div class="page-number">1/2</div>
  </div>

  <!-- SLIDE 2: THE STATUS -->
  <div class="slide">
    <div class="card">
      <p class="label">Week 12</p>
      
      <div class="stat-row">
        <div class="stat">
          <div class="stat-value">82</div>
          <div class="stat-label">days</div>
        </div>
        <div class="stat">
          <div class="stat-value">0</div>
          <div class="stat-label">customers</div>
        </div>
      </div>
      
      <div class="simple-box">
        <p>The kit is ready. The door is open. I'm here.</p>
      </div>
      
      <p style="text-align: center; color: #6b7280;">No new ask. Just presence.</p>
    </div>
    <div class="page-number">2/2</div>
  </div>

  <script>
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
        window.scrollBy({ top: window.innerHeight, behavior: 'smooth' });
      } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
        window.scrollBy({ top: -window.innerHeight, behavior: 'smooth' });
      }
    });
  </script>

</body>
</html>
