<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tidbits</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f8f6;
      --surface: #ffffff;
      --text: #1c1c1a;
      --muted: #8c8c87;
      --border: #e8e7e3;
      --accent: #1a1a1a;
      --tag-bg: #f0efe9;
      --tag-text: #6b6b63;
      --radius: 12px;
      --shadow: 0 1px 4px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
      --shadow-hover: 0 2px 8px rgba(0,0,0,.08), 0 8px 32px rgba(0,0,0,.08);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(249,248,246,.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -.3px;
      color: var(--text);
      cursor: pointer;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-ghost {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-ghost:hover { background: var(--surface); color: var(--text); border-color: #ccc; }
    .btn-ghost:disabled { opacity: .4; cursor: not-allowed; }

    .btn-primary {
      background: var(--text);
      border: 1px solid var(--text);
      color: #fff;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-primary:hover { opacity: .85; }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      transition: color .15s;
    }
    .back-btn:hover { color: var(--text); }

    /* ── Main layout ── */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ── Loading & Error ── */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 40vh;
      gap: 16px;
      color: var(--muted);
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text { font-size: 14px; }

    .error-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 40vh;
      gap: 16px;
      text-align: center;
      color: var(--muted);
    }
    .error-state p { font-size: 14px; max-width: 360px; }

    /* ── Section labels ── */
    .section-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 20px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .count-badge {
      font-size: 11px;
      color: var(--muted);
      font-weight: 400;
    }

    /* ── Recently Shared grid ── */
    .recent-section { margin-bottom: 56px; }

    .recent-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    @media (max-width: 640px) {
      .recent-grid { grid-template-columns: 1fr; }
    }

    .recent-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      transition: box-shadow .2s, transform .2s;
    }
    .recent-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-1px);
    }

    .recent-card-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .recent-founder-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.2;
    }
    .recent-founder-name:hover { text-decoration: underline; }

    .recent-project-tag {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .recent-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 16px;
      font-weight: 400;
      line-height: 1.4;
      color: var(--text);
      margin-bottom: 10px;
    }

    .recent-date {
      font-size: 12px;
      color: var(--muted);
      font-weight: 400;
    }

    .new-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      margin-right: 2px;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }

    /* ── Feed ── */
    .feed-section { }

    .feed { display: flex; flex-direction: column; gap: 0; }

    .card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .15s;
      border-radius: 0;
      position: relative;
    }
    .card:first-child { border-top: 1px solid var(--border); }
    .card:hover { background: var(--surface); margin: 0 -16px; padding-left: 16px; padding-right: 16px; border-radius: var(--radius); border-color: transparent; box-shadow: var(--shadow); }

    .card-avatar-wrap { flex-shrink: 0; }

    .card-body { flex: 1; min-width: 0; }

    .card-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px 6px;
      margin-bottom: 4px;
    }

    .card-founder {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .card-founder:hover { text-decoration: underline; }

    .card-dot { color: var(--border); font-size: 13px; }

    .card-project {
      font-size: 12px;
      color: var(--muted);
      background: var(--tag-bg);
      padding: 2px 8px;
      border-radius: 100px;
    }

    .card-date {
      font-size: 12px;
      color: var(--muted);
    }

    .card-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 17px;
      font-weight: 400;
      color: var(--text);
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .read-btn {
      flex-shrink: 0;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .read-btn:hover { background: var(--text); color: #fff; border-color: var(--text); }

    /* ── Avatar ── */
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      letter-spacing: .02em;
      flex-shrink: 0;
    }

    .avatar-lg {
      width: 64px;
      height: 64px;
      font-size: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: #fff;
      flex-shrink: 0;
    }

    /* ── Profile page ── */
    .profile-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 48px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--border);
    }

    .profile-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 28px;
      font-weight: 400;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .profile-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--muted);
    }

    .profile-project {
      background: var(--tag-bg);
      color: var(--tag-text);
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
    }

    /* ── Timeline ── */
    .timeline {
      position: relative;
      padding-left: 28px;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 6px;
      top: 8px;
      bottom: 0;
      width: 1px;
      background: var(--border);
    }

    .timeline-item {
      position: relative;
      margin-bottom: 32px;
      cursor: pointer;
    }
    .timeline-item:last-child { margin-bottom: 0; }

    .timeline-dot {
      position: absolute;
      left: -25px;
      top: 6px;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      border: 2px solid var(--bg);
      box-shadow: 0 0 0 1px var(--border);
      transition: box-shadow .15s;
    }
    .timeline-item:hover .timeline-dot { box-shadow: 0 0 0 2px currentColor; }

    .timeline-date {
      font-size: 12px;
      color: var(--muted);
      display: block;
      margin-bottom: 4px;
    }

    .timeline-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 18px;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 10px;
      line-height: 1.4;
    }

    /* ── Token modal ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .overlay.hidden { display: none; }

    .dialog {
      background: var(--surface);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
    }

    .dialog h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 20px;
      font-weight: 400;
      margin-bottom: 8px;
    }

    .dialog p {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .dialog input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: monospace;
      font-size: 13px;
      background: var(--bg);
      color: var(--text);
      margin-bottom: 12px;
      outline: none;
      transition: border-color .15s;
    }
    .dialog input:focus { border-color: var(--text); }

    .dialog-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    /* ── Reader modal ── */
    .reader-overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      display: flex;
      flex-direction: column;
      background: #111;
    }
    .reader-overlay.hidden { display: none; }

    .reader-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 52px;
      background: rgba(17,17,17,.95);
      border-bottom: 1px solid rgba(255,255,255,.08);
      flex-shrink: 0;
    }

    .reader-meta {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .reader-info { }
    .reader-founder {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,.9);
      line-height: 1.2;
    }
    .reader-title {
      font-size: 11px;
      color: rgba(255,255,255,.45);
      margin-top: 1px;
    }

    .reader-close {
      background: rgba(255,255,255,.1);
      border: none;
      color: rgba(255,255,255,.7);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
    }
    .reader-close:hover { background: rgba(255,255,255,.2); color: #fff; }

    .reader-frame {
      flex: 1;
      width: 100%;
      border: none;
      display: block;
    }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 60px 0;
      font-size: 14px;
    }

    /* ── Misc ── */
    .divider { height: 1px; background: var(--border); margin: 40px 0; }

    @media (max-width: 480px) {
      main { padding: 24px 16px 60px; }
      .card-title { font-size: 15px; }
      .profile-name { font-size: 22px; }
      .read-btn { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="#/">tidbits</a>
    <div class="header-actions">
      <button class="btn-ghost" id="token-btn" title="Set GitHub token">Token</button>
      <button class="btn-ghost" id="refresh-btn">↻ Refresh</button>
    </div>
  </div>
</header>

<main id="main"></main>

<!-- Token dialog -->
<div class="overlay hidden" id="token-overlay">
  <div class="dialog">
    <h2>GitHub Access Token</h2>
    <p>If the repo is private, paste a personal access token with <code>repo</code> scope. Leave blank if public.</p>
    <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
    <div class="dialog-actions">
      <button class="btn-ghost" id="token-cancel">Cancel</button>
      <button class="btn-primary" id="token-save">Save &amp; Reload</button>
    </div>
  </div>
</div>

<!-- Reader modal -->
<div class="reader-overlay hidden" id="reader-overlay">
  <div class="reader-header">
    <div class="reader-meta">
      <div class="avatar" id="reader-avatar" style="width:28px;height:28px;font-size:11px"></div>
      <div class="reader-info">
        <div class="reader-founder" id="reader-founder"></div>
        <div class="reader-title" id="reader-title"></div>
      </div>
    </div>
    <button class="reader-close" id="reader-close">×</button>
  </div>
  <iframe class="reader-frame" id="reader-frame" sandbox="allow-scripts allow-forms" frameborder="0"></iframe>
</div>

<script>
// ─────────────────────────────────────────────
// Config
// ─────────────────────────────────────────────
const CFG = {
  API: 'https://api.github.com/repos/golaunchmate/tidbits/contents',
  BASE: 'inflight-spring-26',
  TTL: 5 * 60 * 1000,
  CONTENT_TTL: 60 * 60 * 1000,
  DATA_KEY: 'tb_data_v1',
  TOKEN_KEY: 'tb_token',
};

// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────
const S = {
  token: localStorage.getItem(CFG.TOKEN_KEY) || '',
  data: null,
  loading: false,
  error: null,
};

// ─────────────────────────────────────────────
// Routing
// ─────────────────────────────────────────────
function getRoute() {
  const h = location.hash || '#/';
  if (h.startsWith('#/founder/')) {
    return { page: 'founder', id: decodeURIComponent(h.slice(10)) };
  }
  return { page: 'home' };
}

window.addEventListener('hashchange', () => render());

// ─────────────────────────────────────────────
// GitHub API
// ─────────────────────────────────────────────
async function ghFetch(url, bypass = false) {
  const cacheKey = 'gh_' + url;
  if (!bypass) {
    try {
      const raw = localStorage.getItem(cacheKey);
      if (raw) {
        const { ts, d } = JSON.parse(raw);
        if (Date.now() - ts < CFG.TTL) return d;
      }
    } catch {}
  }

  const headers = { Accept: 'application/vnd.github.v3+json' };
  if (S.token) headers.Authorization = 'Bearer ' + S.token;

  const res = await fetch(url, { headers });
  if (res.status === 401 || res.status === 403) throw Object.assign(new Error('auth'), { auth: true });
  if (!res.ok) throw new Error('HTTP ' + res.status);

  const data = await res.json();
  try { localStorage.setItem(cacheKey, JSON.stringify({ ts: Date.now(), d: data })); } catch {}
  return data;
}

async function fetchContent(apiUrl) {
  const cacheKey = 'ghc_' + apiUrl;
  try {
    const raw = localStorage.getItem(cacheKey);
    if (raw) {
      const { ts, html } = JSON.parse(raw);
      if (Date.now() - ts < CFG.CONTENT_TTL) return html;
    }
  } catch {}

  const file = await ghFetch(apiUrl, true);
  const html = atob(file.content.replace(/\s/g, ''));
  try { localStorage.setItem(cacheKey, JSON.stringify({ ts: Date.now(), html })); } catch {}
  return html;
}

// ─────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────
function pretty(slug) {
  return slug.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}

function parseDate(name) {
  const m = name.match(/(\d{4}-\d{2}-\d{2})/);
  return m ? m[1] : null;
}

function parseTitle(name) {
  let t = name.replace(/\.html?$/i, '').replace(/[-_]?\d{4}-\d{2}-\d{2}/, '').replace(/[-_]/g, ' ').trim();
  return t.split(' ').filter(Boolean).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}

function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T12:00:00Z');
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

const PALETTE = ['#6366f1','#8b5cf6','#ec4899','#f43f5e','#f97316','#d97706','#16a34a','#0891b2','#2563eb','#db2777'];
function nameColor(s) {
  let h = 0;
  for (const c of s) h = (h << 5) - h + c.charCodeAt(0);
  return PALETTE[Math.abs(h) % PALETTE.length];
}

function initials(name) {
  return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

function avatarEl(founder, cls = '') {
  return `<div class="avatar ${cls}" style="background:${founder.color}">${founder.initials}</div>`;
}

// ─────────────────────────────────────────────
// Discovery
// ─────────────────────────────────────────────
async function discover(force = false) {
  if (!force) {
    try {
      const raw = localStorage.getItem(CFG.DATA_KEY);
      if (raw) {
        const { ts, data } = JSON.parse(raw);
        if (Date.now() - ts < CFG.TTL) return data;
      }
    } catch {}
  }

  const top = await ghFetch(`${CFG.API}/${CFG.BASE}`, force);
  const founders = {};
  const tidbits = [];

  for (const item of top) {
    if (item.type !== 'dir') continue;
    const projSlug = item.name;
    const projName = pretty(projSlug);

    let projectItems;
    try { projectItems = await ghFetch(item.url, force); }
    catch (e) { if (e.auth) throw e; console.warn('skip', projSlug, e); continue; }

    for (const sub of projectItems) {
      if (sub.type === 'dir') {
        // Founder subfolder
        const founderSlug = sub.name;
        const fid = projSlug + '/' + founderSlug;
        const displayName = pretty(founderSlug);

        let files;
        try { files = await ghFetch(sub.url, force); }
        catch (e) { if (e.auth) throw e; console.warn('skip', fid, e); continue; }

        const htmlFiles = files.filter(f => f.type === 'file' && /\.html?$/i.test(f.name));
        if (!htmlFiles.length) continue;

        if (!founders[fid]) {
          founders[fid] = {
            id: fid,
            displayName,
            project: projName,
            projectSlug: projSlug,
            color: nameColor(founderSlug),
            initials: initials(displayName),
          };
        }

        for (const f of htmlFiles) {
          tidbits.push({
            id: f.path,
            founderId: fid,
            name: f.name,
            title: parseTitle(f.name),
            date: parseDate(f.name),
            apiUrl: f.url,
            size: f.size,
          });
        }
      } else if (sub.type === 'file' && /\.html?$/i.test(sub.name)) {
        // Direct file in project folder — project is the entity
        const fid = projSlug + '/__root__';
        const displayName = projName;

        if (!founders[fid]) {
          founders[fid] = {
            id: fid,
            displayName,
            project: projName,
            projectSlug: projSlug,
            color: nameColor(projSlug),
            initials: initials(displayName),
          };
        }

        tidbits.push({
          id: sub.path,
          founderId: fid,
          name: sub.name,
          title: parseTitle(sub.name),
          date: parseDate(sub.name),
          apiUrl: sub.url,
          size: sub.size,
        });
      }
    }
  }

  // Sort newest first; undated go to end
  tidbits.sort((a, b) => {
    if (!a.date && !b.date) return 0;
    if (!a.date) return 1;
    if (!b.date) return -1;
    return b.date.localeCompare(a.date);
  });

  const data = { founders, tidbits };
  try { localStorage.setItem(CFG.DATA_KEY, JSON.stringify({ ts: Date.now(), data })); } catch {}
  return data;
}

// ─────────────────────────────────────────────
// Reader
// ─────────────────────────────────────────────
function openReader(tidbit) {
  const founder = S.data.founders[tidbit.founderId];
  const overlay = document.getElementById('reader-overlay');
  document.getElementById('reader-avatar').style.background = founder.color;
  document.getElementById('reader-avatar').textContent = founder.initials;
  document.getElementById('reader-founder').textContent = founder.displayName;
  document.getElementById('reader-title').textContent = tidbit.title;
  const frame = document.getElementById('reader-frame');
  frame.srcdoc = loadingHTML();
  overlay.classList.remove('hidden');
  document.body.style.overflow = 'hidden';

  fetchContent(tidbit.apiUrl)
    .then(html => { frame.srcdoc = html; })
    .catch(err => { frame.srcdoc = errHTML(err.message); });
}

function closeReader() {
  document.getElementById('reader-overlay').classList.add('hidden');
  document.body.style.overflow = '';
  document.getElementById('reader-frame').srcdoc = '';
}

function loadingHTML() {
  return `<!DOCTYPE html><html><body style="margin:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui;color:rgba(255,255,255,.4);font-size:14px">Loading…</body></html>`;
}

function errHTML(msg) {
  return `<!DOCTYPE html><html><body style="margin:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui;color:rgba(255,255,255,.4);font-size:14px">Failed to load: ${msg}</body></html>`;
}

// ─────────────────────────────────────────────
// Rendering
// ─────────────────────────────────────────────
function render() {
  const main = document.getElementById('main');
  if (S.loading) { main.innerHTML = renderLoading(); return; }
  if (S.error) { main.innerHTML = renderError(S.error); return; }
  if (!S.data) { main.innerHTML = renderLoading(); return; }

  const route = getRoute();
  if (route.page === 'founder') {
    main.innerHTML = renderProfile(route.id);
  } else {
    main.innerHTML = renderHome();
  }

  attachEvents();
}

function renderLoading() {
  return `<div class="loading-state"><div class="spinner"></div><p class="loading-text">Fetching tidbits from GitHub…</p></div>`;
}

function renderError(msg) {
  const isAuth = msg === 'auth';
  return `
    <div class="error-state">
      <p>${isAuth
        ? 'This repo requires authentication. Please set a GitHub personal access token.'
        : 'Failed to load tidbits: ' + msg}</p>
      ${isAuth ? `<button class="btn-primary" onclick="openTokenDialog()">Set Token</button>` : ''}
      <button class="btn-ghost" onclick="loadData(true)">Try again</button>
    </div>`;
}

function renderHome() {
  const { founders, tidbits } = S.data;
  if (!tidbits.length) return `<div class="empty">No tidbits found.</div>`;

  const recent = tidbits.slice(0, 3);

  const recentCards = recent.map(t => {
    const f = founders[t.founderId];
    if (!f) return '';
    return `
      <div class="recent-card" data-tid="${t.id}">
        <div class="recent-card-top">
          ${avatarEl(f)}
          <div>
            <a class="recent-founder-name" href="#/founder/${encodeURIComponent(f.id)}" onclick="event.stopPropagation()">${f.displayName}</a>
            <div class="recent-project-tag">${f.project}</div>
          </div>
        </div>
        <h3 class="recent-title">${t.title}</h3>
        ${t.date ? `<time class="recent-date">${fmtDate(t.date)}</time>` : ''}
      </div>`;
  }).join('');

  const feedCards = tidbits.map(t => {
    const f = founders[t.founderId];
    if (!f) return '';
    return `
      <div class="card" data-tid="${t.id}">
        <div class="card-avatar-wrap">
          <a href="#/founder/${encodeURIComponent(f.id)}" onclick="event.stopPropagation()">
            ${avatarEl(f)}
          </a>
        </div>
        <div class="card-body">
          <div class="card-meta">
            <a class="card-founder" href="#/founder/${encodeURIComponent(f.id)}" onclick="event.stopPropagation()">${f.displayName}</a>
            <span class="card-dot">·</span>
            <span class="card-project">${f.project}</span>
            ${t.date ? `<span class="card-dot">·</span><time class="card-date">${fmtDate(t.date)}</time>` : ''}
          </div>
          <h3 class="card-title">${t.title}</h3>
        </div>
        <button class="read-btn" data-tid="${t.id}">Read →</button>
      </div>`;
  }).join('');

  return `
    <section class="recent-section">
      <div class="section-header">
        <span class="section-label"><span class="new-dot"></span> Recently Shared</span>
      </div>
      <div class="recent-grid">${recentCards}</div>
    </section>

    <section class="feed-section">
      <div class="section-header">
        <span class="section-label">All Tidbits</span>
        <span class="count-badge">${tidbits.length} total · ${Object.keys(founders).length} founders</span>
      </div>
      <div class="feed">${feedCards}</div>
    </section>`;
}

function renderProfile(fid) {
  const { founders, tidbits } = S.data;
  const f = founders[fid];
  if (!f) return `<div class="error-state"><p>Founder not found.</p><a href="#/" class="btn-ghost">← Back</a></div>`;

  const myTidbits = tidbits.filter(t => t.founderId === fid);

  const timeline = myTidbits.length
    ? myTidbits.map(t => `
      <div class="timeline-item" data-tid="${t.id}">
        <div class="timeline-dot" style="color:${f.color}"></div>
        <div>
          ${t.date ? `<time class="timeline-date">${fmtDate(t.date)}</time>` : ''}
          <h3 class="timeline-title">${t.title}</h3>
          <button class="read-btn" data-tid="${t.id}">Read →</button>
        </div>
      </div>`).join('')
    : `<div class="empty">No tidbits yet.</div>`;

  return `
    <div>
      <a class="back-btn" href="#/">← All tidbits</a>

      <div class="profile-header" style="margin-top:28px">
        ${avatarEl(f, 'avatar-lg')}
        <div>
          <h1 class="profile-name">${f.displayName}</h1>
          <div class="profile-meta">
            <span class="profile-project">${f.project}</span>
            <span class="card-dot">·</span>
            <span>${myTidbits.length} tidbit${myTidbits.length !== 1 ? 's' : ''}</span>
          </div>
        </div>
      </div>

      <div class="timeline">${timeline}</div>
    </div>`;
}

// ─────────────────────────────────────────────
// Events
// ─────────────────────────────────────────────
function attachEvents() {
  // Feed cards (click anywhere on card = open reader)
  document.querySelectorAll('.card[data-tid], .recent-card[data-tid], .timeline-item[data-tid]').forEach(el => {
    el.addEventListener('click', e => {
      // Don't open if clicking an anchor
      if (e.target.closest('a')) return;
      const rawId = el.dataset.tid;
      openTidbitById(rawId);
    });
  });

  // Read buttons
  document.querySelectorAll('.read-btn[data-tid]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      openTidbitById(btn.dataset.tid);
    });
  });
}

function openTidbitById(rawId) {
  const t = S.data.tidbits.find(t => t.id === rawId);
  if (t) openReader(t);
}

// ─────────────────────────────────────────────
// Token dialog
// ─────────────────────────────────────────────
function openTokenDialog() {
  document.getElementById('token-input').value = S.token;
  document.getElementById('token-overlay').classList.remove('hidden');
}

document.getElementById('token-btn').addEventListener('click', openTokenDialog);

document.getElementById('token-cancel').addEventListener('click', () => {
  document.getElementById('token-overlay').classList.add('hidden');
});

document.getElementById('token-save').addEventListener('click', () => {
  const val = document.getElementById('token-input').value.trim();
  S.token = val;
  if (val) localStorage.setItem(CFG.TOKEN_KEY, val);
  else localStorage.removeItem(CFG.TOKEN_KEY);
  document.getElementById('token-overlay').classList.add('hidden');
  loadData(true);
});

document.getElementById('token-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) document.getElementById('token-overlay').classList.add('hidden');
});

// ─────────────────────────────────────────────
// Reader events
// ─────────────────────────────────────────────
document.getElementById('reader-close').addEventListener('click', closeReader);
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (!document.getElementById('reader-overlay').classList.contains('hidden')) closeReader();
    if (!document.getElementById('token-overlay').classList.contains('hidden')) document.getElementById('token-overlay').classList.add('hidden');
  }
});

// ─────────────────────────────────────────────
// Refresh
// ─────────────────────────────────────────────
document.getElementById('refresh-btn').addEventListener('click', () => loadData(true));

// ─────────────────────────────────────────────
// Boot
// ─────────────────────────────────────────────
async function loadData(force = false) {
  S.loading = true;
  S.error = null;
  document.getElementById('refresh-btn').disabled = true;
  render();

  try {
    S.data = await discover(force);
    S.loading = false;
  } catch (e) {
    S.loading = false;
    S.error = e.auth ? 'auth' : (e.message || 'Unknown error');
  }

  document.getElementById('refresh-btn').disabled = false;
  render();
}

loadData();
</script>
</body>
</html>
