<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launchmate - In-Flight Spring 2026 Tidbits</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #888;
            font-size: 1.1rem;
        }
        
        .founders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        
        .founder-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .founder-card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(0, 212, 255, 0.5);
            transform: translateY(-5px);
        }
        
        .founder-name {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #fff;
        }
        
        .tidbit-count {
            color: #00d4ff;
            font-size: 0.9rem;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        
        .error {
            text-align: center;
            padding: 40px;
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 Launchmate Tidbits</h1>
            <p class="subtitle">In-Flight Spring 2026 Cohort</p>
        </header>
        
        <div id="founders-view" class="founders-grid"></div>
    </div>

    <script>
        const REPO_OWNER = 'golaunchmate';
        
        const founderConfig = {
            'kavindi-seneviratne': {
                name: 'Kavindi Seneviratne',
                craigPatterns: ['kavindi']
            },
            'zach-brenner': {
                name: 'Zach Brenner',
                craigPatterns: ['zach']
            },
            'billy-carter': {
                name: 'Billy Carter',
                craigPatterns: ['billy']
            },
            'muhammad-qudsi': {
                name: 'Muhammad Qudsi',
                craigPatterns: ['qudsi']
            },
            'juan-alcala': {
                name: 'Juan Alcala',
                craigPatterns: ['juan']
            },
            'robert-sanchez': {
                name: 'Robert Sanchez',
                craigPatterns: ['robert']
            },
            'vineeta-khanna': {
                name: 'Vineeta Khanna',
                craigPatterns: ['vineeta']
            }
        };
        
        async function fetchFolderContents(repo, path) {
            const url = `https://api.github.com/repos/${REPO_OWNER}/${repo}/contents/${path}`;
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Failed to fetch');
                const data = await response.json();
                return data.filter(item => item.type === 'file' && item.name.endsWith('.html'));
            } catch (error) {
                console.error(`Error fetching ${path}:`, error);
                return [];
            }
        }
        
        async function fetchCraigTidbits(patterns) {
            const url = `https://api.github.com/repos/${REPO_OWNER}/craig/contents`;
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Failed to fetch');
                const data = await response.json();
                return data.filter(item => {
                    if (item.type !== 'file' || !item.name.endsWith('.html')) return false;
                    const lowerName = item.name.toLowerCase();
                    return patterns.some(p => lowerName.startsWith(p.toLowerCase()));
                });
            } catch (error) {
                console.error('Error fetching craig tidbits:', error);
                return [];
            }
        }
        
        async function loadFounders() {
            const container = document.getElementById('founders-view');
            container.innerHTML = '<div class="loading">Loading founders...</div>';
            
            const founders = [];
            
            for (const [folder, config] of Object.entries(founderConfig)) {
                const tidbitsPath = `inflight-spring-26/${folder}`;
                const tidbitsFiles = await fetchFolderContents('tidbits', tidbitsPath);
                const craigFiles = await fetchCraigTidbits(config.craigPatterns);
                const total = tidbitsFiles.length + craigFiles.length;
                
                founders.push({
                    folder: folder,
                    name: config.name,
                    count: total
                });
            }
            
            founders.sort((a, b) => b.count - a.count);
            
            container.innerHTML = founders.map(founder => `
                <a href="founder.html?name=${founder.folder}" class="founder-card">
                    <div class="founder-name">${founder.name}</div>
                    <div class="tidbit-count">${founder.count} tidbit${founder.count !== 1 ? 's' : ''}</div>
                </a>
            `).join('');
        }
        
        loadFounders();
    </script>
</body>
</html>
