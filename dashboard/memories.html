<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaunchMate Agent Memories</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0a0f1a;
            --bg-secondary: #111827;
            --bg-card: rgba(17, 24, 39, 0.8);
            --bg-glass: rgba(255, 255, 255, 0.03);
            --accent-primary: #3b82f6;
            --accent-secondary: #8b5cf6;
            --accent-tertiary: #10b981;
            --accent-gradient: linear-gradient(135deg, #3b82f6, #8b5cf6);
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        .bg-gradient {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse at 30% 30%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 70%, rgba(16, 185, 129, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 15, 26, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
        }
        
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: var(--text-primary);
        }
        
        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #8b5cf6, #10b981);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #8b5cf6, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .nav-links {
            display: flex;
            gap: 1rem;
        }
        
        .nav-link {
            padding: 0.5rem 1rem;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            transition: all 0.2s ease;
        }
        
        .nav-link:hover {
            background: var(--bg-card);
            color: var(--text-primary);
        }
        
        .nav-link.active {
            background: linear-gradient(135deg, #8b5cf6, #10b981);
            border-color: transparent;
            color: white;
        }
        
        .main {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow);
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }
        
        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #8b5cf6, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
        }
        
        .memory-hierarchy {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .memory-category {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }
        
        .category-header {
            background: var(--bg-glass);
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .category-header:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        
        .category-name {
            font-size: 1.125rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .category-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }
        
        .category-icon.human { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
        .category-icon.persona { background: linear-gradient(135deg, #8b5cf6, #6d28d9); }
        .category-icon.project { background: linear-gradient(135deg, #10b981, #059669); }
        
        .category-count {
            font-size: 0.875rem;
            color: var(--text-muted);
            background: var(--bg-glass);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
        }
        
        .category-content {
            padding: 1rem 1.5rem;
            display: none;
        }
        
        .category-content.open {
            display: block;
        }
        
        .memory-files {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }
        
        .memory-file {
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        
        .memory-file:hover {
            border-color: rgba(139, 92, 246, 0.4);
            transform: translateY(-2px);
        }
        
        .file-path {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: 'Monaco', 'Consolas', monospace;
            margin-bottom: 0.5rem;
        }
        
        .file-name {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }
        
        .file-description {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        
        .file-size {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }
        
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: none;
            overflow-y: auto;
            padding: 2rem;
        }
        
        .modal-overlay.show {
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }
        
        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            max-width: 900px;
            width: 100%;
            padding: 2rem;
            animation: modalIn 0.3s ease;
        }
        
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        
        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .modal-path {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
            font-family: monospace;
        }
        
        .modal-close {
            width: 40px;
            height: 40px;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-secondary);
            font-size: 1.25rem;
            cursor: pointer;
        }
        
        .modal-close:hover {
            background: #ef4444;
            border-color: #ef4444;
            color: white;
        }
        
        .modal-body {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            max-height: 60vh;
            overflow-y: auto;
        }
        
        .modal-body pre {
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 0.8rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: var(--text-secondary);
        }
        
        .agent-info {
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem;
            margin-top: 2rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        
        .agent-info code {
            background: var(--bg-card);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            color: var(--accent-secondary);
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--accent-secondary); border-radius: 4px; }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    
    <header class="header">
        <div class="header-content">
            <a href="https://golaunchmate.github.io/memories" target="_blank" class="logo">
                <div class="logo-icon">🧠</div>
                <span class="logo-text">Agent Memories</span>
            </a>
            
            <div class="nav-links">
                <a href="https://golaunchmate.github.io/tidbits/dashboard/" class="nav-link">Tidbits Dashboard</a>
                <a href="https://github.com/golaunchmate/memories" target="_blank" class="nav-link">GitHub Repo</a>
            </div>
        </div>
    </header>
    
    <main class="main">
        <section class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Memory Files</div>
                <div class="stat-value" id="stat-files">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Categories</div>
                <div class="stat-value" id="stat-categories">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Last Sync</div>
                <div class="stat-value" id="stat-sync">--</div>
            </div>
        </section>
        
        <h2 class="section-title">Memory Hierarchy</h2>
        
        <div class="memory-hierarchy" id="memory-hierarchy"></div>
        
        <div class="agent-info">
            🤖 <strong>Agent Memory:</strong> This dashboard displays the persistent memory of Letta Code agents. 
            Access raw files at <code>https://github.com/golaunchmate/memories</code>
        </div>
    </main>
    
    <div class="modal-overlay" id="memory-modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div>
                    <div class="modal-title" id="modal-title">Memory File</div>
                    <div class="modal-path" id="modal-path">path/to/file.md</div>
                </div>
                <button class="modal-close" onclick="closeMemoryModal()">×</button>
            </div>
            <div class="modal-body">
                <pre id="modal-content">Loading...</pre>
            </div>
        </div>
    </div>
    
    <script>
        // Memory data structure (would be fetched from GitHub API in production)
        const memoryData = {
            human: {
                name: 'Human',
                icon: '👤',
                files: [
                    { path: 'system/human.md', name: 'Human Overview', description: 'What I know about the person I work with - Laura Wetherhold' },
                    { path: 'system/human/identity.md', name: 'Identity', description: 'Detailed identity of the user - Laura Wetherhold' },
                    { path: 'system/human/prefs/workflow.md', name: 'Workflow Preferences', description: 'User workflow and communication preferences' }
                ]
            },
            persona: {
                name: 'Persona',
                icon: '🎭',
                files: [
                    { path: 'system/persona.md', name: 'Persona Overview', description: 'My identity and behavior as a stateful coding agent' },
                    { path: 'system/persona/behavior/learned.md', name: 'Learned Behavior', description: 'Behavioral adaptations learned from user interactions' }
                ]
            },
            project: {
                name: 'Project',
                icon: '📁',
                files: [
                    { path: 'system/project/overview.md', name: 'Project Overview', description: 'LaunchMate project overview and tech stack' },
                    { path: 'system/project/conventions.md', name: 'Conventions', description: 'Project-specific coding conventions and patterns' },
                    { path: 'system/project/gotchas.md', name: 'Gotchas', description: 'Footguns and gotchas to watch out for' },
                    { path: 'system/project/team.md', name: 'Team', description: 'LaunchMate team structure and stakeholders' },
                    { path: 'system/project/architecture/directory-structure.md', name: 'Directory Structure', description: 'Project directory structure and key files' },
                    { path: 'system/project/tooling/commands.md', name: 'Commands', description: 'Build, dev, and lint commands for LaunchMate' }
                ]
            }
        };
        
        function init() {
            const totalFiles = Object.values(memoryData).reduce((sum, cat) => sum + cat.files.length, 0);
            document.getElementById('stat-files').textContent = totalFiles;
            document.getElementById('stat-categories').textContent = Object.keys(memoryData).length;
            document.getElementById('stat-sync').textContent = 'Today';
            
            renderHierarchy();
        }
        
        function renderHierarchy() {
            const container = document.getElementById('memory-hierarchy');
            container.innerHTML = '';
            
            Object.entries(memoryData).forEach(([key, category]) => {
                const div = document.createElement('div');
                div.className = 'memory-category';
                div.innerHTML = `
                    <div class="category-header" onclick="toggleCategory('${key}')">
                        <div class="category-name">
                            <div class="category-icon ${key}">${category.icon}</div>
                            ${category.name}
                        </div>
                        <span class="category-count">${category.files.length} files</span>
                    </div>
                    <div class="category-content" id="content-${key}">
                        <div class="memory-files">
                            ${category.files.map(file => `
                                <div class="memory-file" onclick="openMemory('${file.path}', '${file.name}')">
                                    <div class="file-path">${file.path}</div>
                                    <div class="file-name">${file.name}</div>
                                    <div class="file-description">${file.description}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }
        
        function toggleCategory(key) {
            const content = document.getElementById('content-' + key);
            content.classList.toggle('open');
        }
        
        function openMemory(path, name) {
            document.getElementById('modal-title').textContent = name;
            document.getElementById('modal-path').textContent = path;
            document.getElementById('modal-content').textContent = 'Loading memory content...\n\nIn production, this would fetch the actual content from:\nhttps://raw.githubusercontent.com/golaunchmate/memories/main/' + path;
            document.getElementById('memory-modal').classList.add('show');
            document.body.style.overflow = 'hidden';
        }
        
        function closeMemoryModal() {
            document.getElementById('memory-modal').classList.remove('show');
            document.body.style.overflow = '';
        }
        
        function closeModal(event) {
            if (event.target.id === 'memory-modal') closeMemoryModal();
        }
        
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeMemoryModal();
        });
        
        // Open first category by default
        setTimeout(() => toggleCategory('human'), 100);
        
        init();
    </script>
</body>
</html>
